apiVersion: apps/v1
kind: Deployment
metadata:
  name: grocy
  namespace: default
  labels:
    app.kubernetes.io/instance: grocy
    app.kubernetes.io/name: grocy
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grocy
      app.kubernetes.io/instance: grocy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grocy
        app.kubernetes.io/instance: grocy
    spec:
      serviceAccountName: grocy
      automountServiceAccountToken: false
      containers:
        - name: grocy
          image: lscr.io/linuxserver/grocy:4.6.0
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Amsterdam
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: grocy-data
              mountPath: /config
      volumes:
        - name: grocy-data
          persistentVolumeClaim:
            claimName: grocy-data
