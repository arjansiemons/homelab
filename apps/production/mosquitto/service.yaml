apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: default
  annotations:
    "lbipam.cilium.io/ips": "192.168.2.67"
spec:
  externalTrafficPolicy: Local
  ports:
    - name: mqtt
      port: 1883
      targetPort: mqtt
    - name: wss
      port: 9001
      targetPort: websocket
  selector:
    app: mosquitto
  type: LoadBalancer
  # Use an loadBalancerIP (e.g. MetalLB) or externalIP depending on your setup