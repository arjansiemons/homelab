apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: backup-schedules
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./infrastructure/velero-schedules
  prune: true
  sourceRef:
    kind: GitRepository
    name: homelab
  dependsOn:
    - name: backups
