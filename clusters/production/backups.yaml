apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: backups
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./infrastructure/velero
  prune: true
  postBuild:
    substituteFrom:
      - kind: Secret
        name: backup-config
        optional: false
  sourceRef:
    kind: GitRepository
    name: homelab
  dependsOn:
    - name: infrastructure
