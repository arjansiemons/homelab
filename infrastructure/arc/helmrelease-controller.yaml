apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc
  namespace: arc-systems
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: gha-runner-scale-set-controller
      version: "0.10.1"
      sourceRef:
        kind: HelmRepository
        name: arc
        namespace: arc-systems
