apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-runner-set
  namespace: arc-runners
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  dependsOn:
    - name: arc
      namespace: arc-systems
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.10.1"
      sourceRef:
        kind: HelmRepository
        name: arc
        namespace: arc-systems
  values:
    githubConfigUrl: "https://github.com/arjansiemons/blog"
    githubConfigSecret: "arc-github-token"
    maxRunners: 5
    minRunners: 1
    containerMode:
      type: kubernetes
      kubernetesModeWorkVolumeClaim:
        storageClassName: proxmox-csi
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
    template:
      spec:
        securityContext:
          fsGroup: 1001
          runAsUser: 1001
          runAsGroup: 1001
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:2.334.0
            command:
              - /home/runner/run.sh
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: "2"
                memory: 2Gi
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
            env:
              - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
                value: "false"
    listenerTemplate:
      spec:
        securityContext:
          runAsUser: 65532
          runAsGroup: 65532
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        containers:
          - name: listener
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
            securityContext:
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
        volumes:
          - name: work
            ephemeral:
              volumeClaimTemplate:
                spec:
                  storageClassName: proxmox-csi
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 1Gi
