apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-runner-set
  namespace: arc-runners
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  dependsOn:
    - name: arc
      namespace: arc-systems
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.10.1"
      sourceRef:
        kind: HelmRepository
        name: arc
        namespace: arc-systems
  values:
    githubConfigUrl: "https://github.com/arjansiemons/blog"
    githubConfigSecret: "arc-github-token"
    maxRunners: 5
    minRunners: 1
    containerMode:
      type: kubernetes
      kubernetesModeWorkVolumeClaim:
        storageClassName: proxmox-csi
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
    template:
      spec:
        securityContext:
          fsGroup: 1001
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:2.334.0
            command:
              - /home/runner/run.sh
            env:
              - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
                value: "false"
        volumes:
          - name: work
            ephemeral:
              volumeClaimTemplate:
                spec:
                  storageClassName: proxmox-csi
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 1Gi
