apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespaces.yaml
  - helmrepo.yaml
  - helmrelease-controller.yaml
  - external-secret.yaml
  - helmrelease-runner-set.yaml
  - networkpolicy-arc-systems.yaml
  - networkpolicy-arc-runners.yaml
  - pdb-controller.yaml
  - pdb-listener.yaml
  - pdb-runners.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/managed-by: flux
      app.kubernetes.io/part-of: arc
