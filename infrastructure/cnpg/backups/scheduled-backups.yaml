apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: n8n-postgres-daily
  namespace: postgresql-system
spec:
  schedule: "0 2 * * *"
  backupOwnerReference: self
  cluster:
    name: n8n-postgres
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: cert-practice-postgres-daily
  namespace: postgresql-system
spec:
  schedule: "30 2 * * *"
  backupOwnerReference: self
  cluster:
    name: cert-practice-postgres
