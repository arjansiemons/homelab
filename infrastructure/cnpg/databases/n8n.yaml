apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: n8n-postgres
  namespace: postgresql-system
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  backup:
    barmanObjectStore:
      destinationPath: s3://${B2_BUCKET_NAME}/cnpg/n8n-postgres
      endpointURL: https://${B2_S3_URL}
      s3Credentials:
        accessKeyId:
          name: cnpg-backup-b2-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backup-b2-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
    retentionPolicy: "14d"
  storage:
    size: 10Gi
    storageClass: proxmox-csi
  bootstrap:
    initdb:
      database: n8n
      owner: n8n

