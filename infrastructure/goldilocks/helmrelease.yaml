apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goldilocks
  namespace: goldilocks
spec:
  interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: goldilocks
      version: ">=10.0.0 <11.0.0"
      sourceRef:
        kind: HelmRepository
        name: fairwinds-stable
        namespace: flux-system
  values:
    vpa:
      enabled: true
      updater:
        enabled: false
    metrics-server:
      enabled: false
    dashboard:
      enabled: true
      flags:
        on-by-default: true
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: local-siemons-it-nl
        hosts:
          - host: goldilocks.local.siemons-it.nl
            paths:
              - path: /
                type: Prefix
        tls:
          - secretName: local-siemons-it-nl-tls
            hosts:
              - goldilocks.local.siemons-it.nl
    controller:
      flags:
        on-by-default: true
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              namespace: goldilocks
              name: goldilocks-controller
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/resources
                value:
                  requests:
                    cpu: 25m
                    memory: 64Mi
                  limits:
                    cpu: 200m
                    memory: 256Mi
              - op: add
                path: /spec/template/spec/containers/0/livenessProbe
                value:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 15
                  periodSeconds: 20
              - op: add
                path: /spec/template/spec/containers/0/readinessProbe
                value:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 10
          - target:
              kind: Deployment
              namespace: goldilocks
              name: goldilocks-dashboard
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/resources
                value:
                  requests:
                    cpu: 25m
                    memory: 64Mi
                  limits:
                    cpu: 200m
                    memory: 256Mi
          - target:
              kind: Deployment
              namespace: goldilocks
              name: goldilocks-vpa-admission-controller
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/resources
                value:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    cpu: 300m
                    memory: 384Mi
          - target:
              kind: Deployment
              namespace: goldilocks
              name: goldilocks-vpa-recommender
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/resources
                value:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    cpu: 500m
                    memory: 512Mi
          - target:
              kind: Service
              namespace: goldilocks
              name: goldilocks-vpa-webhook
            patch: |
              - op: add
                path: /spec/ports/0/name
                value: https
              - op: replace
                path: /spec/ports/0/targetPort
                value: http
