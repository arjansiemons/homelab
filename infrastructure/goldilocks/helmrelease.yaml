apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goldilocks
  namespace: goldilocks
spec:
  interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: goldilocks
      version: ">=10.0.0 <11.0.0"
      sourceRef:
        kind: HelmRepository
        name: fairwinds-stable
        namespace: flux-system
  values:
    vpa:
      enabled: true
      updater:
        enabled: false
    metrics-server:
      enabled: false
    dashboard:
      enabled: true
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: local-siemons-it-nl
        hosts:
          - host: goldilocks.local.siemons-it.nl
            paths:
              - path: /
                type: Prefix
        tls:
          - secretName: local-siemons-it-nl-tls
            hosts:
              - goldilocks.local.siemons-it.nl
