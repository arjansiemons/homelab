                      },
                      "custom": {
                         "fillOpacity": 30,
                         "gradientMode": "opacity",
                         "lineInterpolation": "smooth",
                         "lineWidth": 2,
                         "showPoints": "never"
                      },
                      "thresholds": {
                         "mode": "absolute",
                         "steps": [ ]
                      }
                   }
                },
                "gridPos": {
                   "h": 6,
                   "w": 12,
                   "x": 0,
                   "y": 18
                },
                "id": 9,
                "options": {
                   "legend": {
                      "calcs": [ ],
                      "displayMode": "list"
                   },
                   "tooltip": {
