apiVersion: v1
data:
  velero-cluster-view.json: |-
    {
          "links": [
             {
                "keepTime": true,
                "title": "Velero logs",
                "type": "link",
                "url": "/d/velero-logs"
             },
             {
                "keepTime": true,
                "title": "Velero overview",
                "type": "link",
                "url": "/d/velero-overview"
             }
          ],
          "panels": [
             {
                "datasource": {
                   "type": "prometheus",
                   "uid": "${prometheus_datasource}"
                },
                "description": "Number of successful backups across all clusters.",
                "fieldConfig": {
                   "defaults": {
                      "color": {
                         "fixedColor": "text",
                         "mode": "fixed"
                      },
                      "thresholds": {
                         "mode": "absolute",
                         "steps": [
                            {
                               "color": "#5794f2",
                               "value": null
                            }
                         ]
                      }
                   }
                },
                "gridPos": {
                   "h": 4,
                   "w": 4,
                   "x": 0,
                   "y": 0
                },
                "id": 1,
                "options": {
                   "graphMode": "area",
                   "reduceOptions": {
                      "calcs": [
                         "lastNotNull"
                      ]
                   }
                },
                "pluginVersion": "v11.0.0",
                "targets": [
                   {
                      "datasource": {
                         "type": "prometheus",
                         "uid": "${prometheus_datasource}"
                      },
                      "expr": "sum by (cluster) ((increase(velero_backup_success_total{job=~\"$job\",cluster=~\"$cluster\"}[$__interval:])))",
                      "legendFormat": "Backups"
                   }
                ],
                "title": "Successful backups / $__interval ",
                "type": "stat"
             },
             {
                "datasource": {
                   "type": "prometheus",
                   "uid": "${prometheus_datasource}"
                },
                "description": "Number of failed backups across all clusters",
                "fieldConfig": {
                   "defaults": {
                      "color": {
                         "fixedColor": "text",
                         "mode": "fixed"
                      },
                      "thresholds": {
                         "mode": "absolute",
                         "steps": [
                            {
                               "color": "#5794f2",
                               "value": null
                            }
                         ]
                      }
                   }
                },
                "gridPos": {
                   "h": 4,
                   "w": 4,
                   "x": 4,
                   "y": 0
                },
                "id": 2,
                "options": {
                   "graphMode": "area",
                   "reduceOptions": {
                      "calcs": [
                         "lastNotNull"
                      ]
                   }
                },
                "pluginVersion": "v11.0.0",
                "targets": [
                   {
                      "datasource": {
                         "type": "prometheus",
                         "uid": "${prometheus_datasource}"
                      },
                      "expr": "sum by (cluster) ((increase(velero_backup_failure_total{job=~\"$job\",cluster=~\"$cluster\"}[$__interval:])))",
                      "legendFormat": "Backups"
                   }
                ],
                "title": "Failed backups / $__interval ",
                "type": "stat"
             },
             {
                "datasource": {
                   "type": "prometheus",
                   "uid": "${prometheus_datasource}"
                },
                "description": "Number of succesful restores across all clusters.",
                "fieldConfig": {
                   "defaults": {
                      "color": {
                         "fixedColor": "text",
                         "mode": "fixed"
                      },
                      "thresholds": {
                         "mode": "absolute",
                         "steps": [
                            {
                               "color": "#5794f2",
                               "value": null
                            }
                         ]
                      }
                   }
                },
                "gridPos": {
                   "h": 4,
                   "w": 4,
                   "x": 8,
                   "y": 0
                },
                "id": 3,
                "options": {
                   "graphMode": "area",
                   "reduceOptions": {
                      "calcs": [
                         "lastNotNull"
                      ]
                   }
                },
                "pluginVersion": "v11.0.0",
                "targets": [
                   {
                      "datasource": {
                         "type": "prometheus",
                         "uid": "${prometheus_datasource}"
                      },
                      "expr": "sum by (cluster) ((increase(velero_restore_success_total{job=~\"$job\",cluster=~\"$cluster\"}[$__interval:])))",
                      "legendFormat": "Restores"
                   }
                ],
                "title": "Succesful restores / $__interval ",
                "type": "stat"
             },
             {
                "datasource": {
                   "type": "prometheus",
                   "uid": "${prometheus_datasource}"
                },
                "description": "Number of failed restores across all clusters.",
                "fieldConfig": {
                   "defaults": {
                      "color": {
                         "fixedColor": "text",
                         "mode": "fixed"
                      },
                      "thresholds": {
                         "mode": "absolute",
                         "steps": [
                            {
                               "color": "#5794f2",
                               "value": null
                            }
                         ]
                      }
                   }
                },
                "gridPos": {
                   "h": 4,
                   "w": 4,
                   "x": 12,
                   "y": 0
                },
                "id": 4,
                "options": {
                   "graphMode": "area",
                   "reduceOptions": {
                      "calcs": [
                         "lastNotNull"
                      ]
                   }
                },
                "pluginVersion": "v11.0.0",
                "targets": [
                   {
                      "datasource": {
                         "type": "prometheus",
                         "uid": "${prometheus_datasource}"
                      },
                      "expr": "sum by (cluster) ((increase(velero_restore_failed_total{job=~\"$job\",cluster=~\"$cluster\"}[$__interval:])))",
                      "legendFormat": "Restores"
                   }
                ],
                "title": "Failed restores / $__interval ",
                "type": "stat"
             },
             {
                "datasource": {
                   "type": "datasource",
                   "uid": "-- Mixed --"
                },
                "description": "Status of firing alerts for Velero.",
                "gridPos": {
                   "h": 4,
                   "w": 8,
                   "x": 16,
                   "y": 0
                },
                "id": 5,
                "options": {
                   "alertInstanceLabelFilter": "job=~\"${job:regex}\",cluster=~\"${cluster:regex}\""
                },
                "pluginVersion": "v10.0.0",
                "title": "Velero alerts",
                "type": "alertlist"
             },
             {
                "datasource": {
                   "type": "prometheus",
                   "uid": "${prometheus_datasource}"
                },
                "description": "The top clusters by number of backups.\n",
                "fieldConfig": {
                   "defaults": {
                      "color": {
                         "fixedColor": "#5794f2",
                         "mode": "palette-classic"
                      },
                      "custom": {
                         "fillOpacity": 30,
                         "gradientMode": "opacity",
                         "lineInterpolation": "smooth",
                         "lineWidth": 2,
                         "showPoints": "never"
                      },
                      "thresholds": {
                         "mode": "absolute",
                         "steps": [ ]
                      }
                   }
                },
                "gridPos": {
                   "h": 6,
                   "w": 12,
                   "x": 0,
                   "y": 6
                },
                "id": 6,
                "options": {
                   "legend": {
                      "calcs": [ ],
                      "displayMode": "list"
                   },
                   "tooltip": {
                      "mode": "multi",
                      "sort": "desc"
                   }
                },
                "pluginVersion": "v11.0.0",
                "targets": [
                   {
                      "datasource": {
                         "type": "prometheus",
                         "uid": "${prometheus_datasource}"
                      },
                      "expr": "topk by(cluster)($top_cluster_count, sum by (cluster) (increase(velero_backup_success_total{job=~\"$job\",cluster=~\"$cluster\"}[$__interval:])))",
                      "legendFormat": "{{cluster}} - success"
                   },
                   {
                      "datasource": {
                         "type": "prometheus",
                         "uid": "${prometheus_datasource}"
                      },
                      "expr": "topk by(cluster)($top_cluster_count, sum by (cluster) (increase(velero_backup_failure_total{job=~\"$job\",cluster=~\"$cluster\"}[$__interval:])))",
                      "legendFormat": "{{cluster}} - failure"
                   },
                   {
                      "datasource": {
                         "type": "prometheus",
                         "uid": "${prometheus_datasource}"
                      },
                      "expr": "topk by(cluster)($top_cluster_count, sum by (cluster) (increase(velero_backup_attempt_total{job=~\"$job\",cluster=~\"$cluster\"}[$__interval:])))",
                      "legendFormat": "{{cluster}} - attempt"
                   }
                ],
                "title": "Top clusters by backups / $__interval ",
                "type": "timeseries"
             },
             {
                "datasource": {
                   "type": "prometheus",
                   "uid": "${prometheus_datasource}"
                },
                "description": "Top clusters by number of restores.\n",
                "fieldConfig": {
                   "defaults": {
                      "color": {
                         "fixedColor": "#5794f2",
                         "mode": "palette-classic"
                      },
                      "custom": {
                         "fillOpacity": 30,
                         "gradientMode": "opacity",
                         "lineInterpolation": "smooth",
                         "lineWidth": 2,
                         "showPoints": "never"
                      },
                      "thresholds": {
                         "mode": "absolute",
