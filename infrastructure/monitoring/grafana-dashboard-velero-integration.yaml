             },
             {
                "datasource": {
                   "type": "prometheus",
                   "uid": "${prometheus_datasource}"
                },
                "description": "Top clusters by number of CSI snapshots.",
                "fieldConfig": {
                   "defaults": {
                      "color": {
                         "fixedColor": "#5794f2",
                         "mode": "palette-classic"
                      },
                      "custom": {
                         "fillOpacity": 30,
                         "gradientMode": "opacity",
                         "lineInterpolation": "smooth",
                         "lineWidth": 2,
                         "showPoints": "never"
                      },
                      "thresholds": {
                         "mode": "absolute",
                         "steps": [ ]
                      }
                   }
                },
                "gridPos": {
                   "h": 6,
                   "w": 12,
                   "x": 12,
                   "y": 18
                },
                "id": 10,
                "options": {
                   "legend": {
                      "calcs": [ ],
                      "displayMode": "list"
                   },
                   "tooltip": {
                      "mode": "multi",
                      "sort": "desc"
                   }
                },
                "pluginVersion": "v11.0.0",
                "targets": [
                   {
                      "datasource": {
                         "type": "prometheus",
                         "uid": "${prometheus_datasource}"
                      },
                      "expr": "topk by(cluster)($top_cluster_count, sum by (cluster) (increase(velero_csi_snapshot_success_total{job=~\"$job\",cluster=~\"$cluster\"}[$__interval:])))",
                      "legendFormat": "{{cluster}} - success"
                   },
                   {
                      "datasource": {
                         "type": "prometheus",
                         "uid": "${prometheus_datasource}"
                      },
                      "expr": "topk by(cluster)($top_cluster_count, sum by (cluster) (increase(velero_csi_snapshot_failure_total{job=~\"$job\",cluster=~\"$cluster\"}[$__interval:])))",
                      "legendFormat": "{{cluster}} - failure"
                   },
                   {
                      "datasource": {
                         "type": "prometheus",
                         "uid": "${prometheus_datasource}"
                      },
                      "expr": "topk by(cluster)($top_cluster_count, sum by (cluster) (increase(velero_csi_snapshot_attempt_total{job=~\"$job\",cluster=~\"$cluster\"}[$__interval:])))",
                      "legendFormat": "{{cluster}} - attempt"
                   }
                ],
                "title": "Top clusters by CSI snapshots / $__interval ",
                "type": "timeseries"
             }
          ],
          "refresh": "1m",
          "schemaVersion": 36,
          "tags": [
             "velero"
          ],
          "templating": {
             "list": [
                {
                   "label": "Prometheus data source",
                   "name": "prometheus_datasource",
                   "query": "prometheus",
                   "regex": "",
                   "type": "datasource"
                },
                {
                   "allValue": ".+",
                   "datasource": {
                      "type": "prometheus",
                      "uid": "${prometheus_datasource}"
                   },
                   "includeAll": true,
                   "label": "Job",
                   "multi": true,
                   "name": "job",
                   "query": "label_values(velero_backup_success_total{job=\"integrations/velero\"}, job)",
                   "refresh": 2,
                   "sort": 1,
                   "type": "query"
                },
                {
                   "allValue": ".+",
                   "datasource": {
                      "type": "prometheus",
                      "uid": "${prometheus_datasource}"
                   },
                   "includeAll": true,
                   "label": "Cluster",
                   "multi": true,
                   "name": "cluster",
                   "query": "label_values(velero_backup_success_total{job=\"integrations/velero\",job=~\"$job\"}, cluster)",
                   "refresh": 2,
                   "sort": 1,
                   "type": "query"
                },
                {
                   "current": {
                      "selected": false,
                      "text": "2",
                      "value": "2"
                   },
                   "description": "This variable allows for modification of top cluster value.",
                   "label": "Top cluster count",
                   "name": "top_cluster_count",
                   "options": [
                      {
                         "selected": true,
                         "text": "2",
                         "value": "2"
                      },
                      {
                         "selected": false,
                         "text": "4",
                         "value": "4"
                      },
                      {
                         "selected": false,
                         "text": "6",
                         "value": "6"
                      },
                      {
                         "selected": false,
                         "text": "8",
                         "value": "8"
                      },
                      {
                         "selected": false,
                         "text": "10",
                         "value": "10"
                      }
                   ],
                   "query": "2 : 2,4 : 4,6 : 6,8 : 8,10 : 10",
                   "type": "custom"
                }
             ]
          },
          "time": {
             "from": "now-30m",
             "to": "now"
          },
          "timezone": "default",
          "title": "Velero cluster view",
          "uid": "velero-cluster-view"
       }
  velero-logs.json: |-
    {
          "links": [
             {
                "keepTime": true,
                "title": "Velero cluster view",
                "type": "link",
                "url": "/d/velero-cluster-view"
             },
             {
                "keepTime": true,
                "title": "Velero overview",
                "type": "link",
                "url": "/d/velero-overview"
             }
          ],
          "panels": [
             {
                "datasource": {
                   "type": "loki",
                   "uid": "${loki_datasource}"
                },
                "description": "Logs volume grouped by \"level\" label.",
                "fieldConfig": {
                   "defaults": {
                      "custom": {
                         "drawStyle": "bars",
                         "fillOpacity": 50,
                         "stacking": {
                            "mode": "normal"
                         }
                      },
                      "unit": "none"
                   },
                   "overrides": [
                      {
                         "matcher": {
                            "id": "byRegexp",
                            "options": "(E|e)merg|(F|f)atal|(A|a)lert|(C|c)rit.*"
                         },
                         "properties": [
                            {
                               "id": "color",
                               "value": {
                                  "fixedColor": "purple",
                                  "mode": "fixed"
                               }
                            }
                         ]
                      },
                      {
                         "matcher": {
                            "id": "byRegexp",
                            "options": "(E|e)(rr.*|RR.*)"
                         },
                         "properties": [
                            {
                               "id": "color",
                               "value": {
                                  "fixedColor": "red",
                                  "mode": "fixed"
                               }
                            }
                         ]
                      },
                      {
                         "matcher": {
                            "id": "byRegexp",
                            "options": "(W|w)(arn.*|ARN.*|rn|RN)"
                         },
                         "properties": [
                            {
                               "id": "color",
                               "value": {
                                  "fixedColor": "orange",
                                  "mode": "fixed"
                               }
                            }
                         ]
                      },
                      {
                         "matcher": {
                            "id": "byRegexp",
                            "options": "(N|n)(otice|ote)|(I|i)(nf.*|NF.*)"
                         },
                         "properties": [
                            {
                               "id": "color",
                               "value": {
                                  "fixedColor": "green",
                                  "mode": "fixed"
                               }
                            }
                         ]
                      },
                      {
                         "matcher": {
                            "id": "byRegexp",
                            "options": "dbg.*|DBG.*|(D|d)(EBUG|ebug)"
                         },
                         "properties": [
                            {
                               "id": "color",
                               "value": {
                                  "fixedColor": "blue",
                                  "mode": "fixed"
                               }
                            }
                         ]
                      },
                      {
                         "matcher": {
                            "id": "byRegexp",
                            "options": "(T|t)(race|RACE)"
                         },
                         "properties": [
                            {
                               "id": "color",
                               "value": {
                                  "fixedColor": "light-blue",
                                  "mode": "fixed"
                               }
                            }
                         ]
                      },
                      {
                         "matcher": {
                            "id": "byRegexp",
                            "options": "logs"
                         },
                         "properties": [
                            {
                               "id": "color",
                               "value": {
                                  "fixedColor": "text",
                                  "mode": "fixed"
                               }
                            }
                         ]
                      }
                   ]
                },
                "gridPos": {
                   "h": 6,
                   "w": 24,
                   "x": 0,
                   "y": 0
                },
                "id": 1,
                "maxDataPoints": 100,
                "options": {
                   "tooltip": {
                      "mode": "multi",
                      "sort": "desc"
                   }
                },
                "pluginVersion": "v11.0.0",
                "targets": [
                   {
                      "datasource": {
                         "type": "loki",
                         "uid": "${loki_datasource}"
                      },
                      "expr": "sum by (level) (count_over_time({job=\"integrations/velero\",job=~\"$job\",instance=~\"$instance\",level=~\"$level\"}\n|~ \"$regex_search\"\n\n[$__auto]))\n",
                      "legendFormat": "{{ level }}"
                   }
                ],
                "title": "Logs volume",
                "transformations": [
                   {
                      "id": "renameByRegex",
                      "options": {
                         "regex": "Value",
                         "renamePattern": "logs"
                      }
                   }
                ],
                "type": "timeseries"
             },
             {
                "datasource": {
                   "type": "datasource",
                   "uid": "-- Mixed --"
                },
                "gridPos": {
                   "h": 18,
                   "w": 24,
                   "x": 0,
                   "y": 18
                },
                "id": 2,
                "options": {
                   "dedupStrategy": "exact",
                   "enableLogDetails": true,
                   "prettifyLogMessage": true,
                   "showTime": false,
                   "wrapLogMessage": false
                },
                "pluginVersion": "v11.0.0",
                "targets": [
                   {
                      "datasource": {
                         "type": "loki",
                         "uid": "${loki_datasource}"
                      },
                      "expr": "{job=\"integrations/velero\",job=~\"$job\",instance=~\"$instance\",level=~\"$level\"} \n|~ \"$regex_search\"\n\n\n"
                   }
                ],
                "title": "Logs",
                "type": "logs"
             }
          ],
          "refresh": "1m",
          "schemaVersion": 39,
          "tags": [
             "velero"
          ],
          "templating": {
             "list": [
                {
                   "label": "Loki data source",
                   "name": "loki_datasource",
