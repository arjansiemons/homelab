apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: velero
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - velero
  selector:
    matchLabels:
      app.kubernetes.io/instance: velero
      app.kubernetes.io/name: velero
  endpoints:
    - port: http-monitoring
      interval: 30s
      scrapeTimeout: 10s
      path: /metrics
      relabelings:
        - targetLabel: job
          replacement: integrations/velero
        - targetLabel: cluster
          replacement: homelab