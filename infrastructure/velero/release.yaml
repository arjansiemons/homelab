apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 10m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: velero
      version: "8.1.x"
      sourceRef:
        kind: HelmRepository
        name: velero
        namespace: flux-system
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: DaemonSet
              namespace: velero
              name: node-agent
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/livenessProbe
                value:
                  httpGet:
                    path: /metrics
                    port: http-monitoring
                    scheme: HTTP
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  successThreshold: 1
                  failureThreshold: 5
              - op: add
                path: /spec/template/spec/containers/0/readinessProbe
                value:
                  httpGet:
                    path: /metrics
                    port: http-monitoring
                    scheme: HTTP
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  successThreshold: 1
                  failureThreshold: 5
  values:
    upgradeCRDs: false
    credentials:
      useSecret: true
      existingSecret: velero-b2-credentials
    kubectl:
      image:
        repository: docker.io/bitnami/kubectl
        tag: latest
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.14.1
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
          - name: plugins
            mountPath: /target
    configuration:
      features: EnableCSI
      backupStorageLocation:
        - name: default
          default: true
          provider: aws
          bucket: ${B2_BUCKET_NAME}
          config:
            region: ${B2_REGION}
            s3Url: https://${B2_S3_URL}
            s3ForcePathStyle: "true"
      volumeSnapshotLocation:
        - name: default
          provider: aws
          credential:
            name: velero-b2-credentials
            key: cloud
          config:
            region: ${B2_REGION}
      repositoryMaintenanceJob:
        repositoryConfigData:
          global:
            podResources:
              cpuRequest: 100m
              cpuLimit: 500m
              memoryRequest: 256Mi
              memoryLimit: 512Mi
            keepLatestMaintenanceJobs: 1
    deployNodeAgent: true
    nodeAgent:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
